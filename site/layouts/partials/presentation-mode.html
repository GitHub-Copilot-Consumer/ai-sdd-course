{{/* Presentation Mode - Hugo Partial
     Injected into site/layouts/_default/single.html via presentation-mode partial.
     Contains all CSS and JS for fullscreen presentation mode.
     Logic is kept in sync with tests/presentation-mode/presentation-mode.js */}}

<style>
  /* ── Presentation Mode Button ── */
  #btn-enter-presentation {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.35rem 0.85rem;
    font-size: 0.8rem;
    font-weight: 600;
    border: 1px solid currentColor;
    border-radius: 0.375rem;
    cursor: pointer;
    background: transparent;
    color: inherit;
    transition: background 0.15s, color 0.15s;
    vertical-align: middle;
    margin-left: 0.75rem;
  }
  #btn-enter-presentation:hover {
    background: rgba(0, 0, 0, 0.07);
  }
  .dark #btn-enter-presentation:hover {
    background: rgba(255, 255, 255, 0.1);
  }

  /* ── slide-only: hidden in normal doc view, shown only in presentation overlay ── */
  .content .slide-only {
    display: none;
  }

  /* ── Presentation Overlay ── */
  #presentation-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #1a1a2e;
    color: #e8e8f0;
    display: flex;
    flex-direction: column;
    font-family: inherit;
  }

  /* ── Top Bar ── */
  #presentation-topbar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 0.6rem 1.2rem;
    background: rgba(255, 255, 255, 0.05);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    flex-shrink: 0;
  }
  #btn-exit-presentation {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: #e8e8f0;
    padding: 0.3rem 0.8rem;
    border-radius: 0.375rem;
    cursor: pointer;
    font-size: 0.85rem;
    transition: background 0.15s;
  }
  #btn-exit-presentation:hover {
    background: rgba(255, 255, 255, 0.15);
  }

  /* ── Slide Area ── */
  #presentation-slide-area {
    flex: 1;
    overflow-y: auto;
    padding: 3rem 6rem;
    max-width: 960px;
    margin: 0 auto;
    width: 100%;
    box-sizing: border-box;
  }

  .presentation-slide h1,
  .presentation-slide h2,
  .presentation-slide h3 {
    color: #a5b4fc;
  }
  .presentation-slide h1 {
    font-size: 3rem;
    margin-top: 0;
    margin-bottom: 0.75rem;
  }
  .presentation-slide h2 {
    font-size: 2rem;
    margin-top: 2rem;
    margin-bottom: 0.75rem;
  }
  .presentation-slide h3 {
    font-size: 1.5rem;
    margin-top: 1.5rem;
    margin-bottom: 0.75rem;
  }
  .presentation-slide p,
  .presentation-slide li {
    font-size: 1.25rem;
    line-height: 1.8;
  }
  .presentation-slide p {
    margin-bottom: 1rem;
  }
  .presentation-slide code {
    background: rgba(255, 255, 255, 0.1);
    padding: 0.15em 0.4em;
    border-radius: 0.25rem;
    font-size: 0.95em;
  }
  .presentation-slide pre {
    background: rgba(255, 255, 255, 0.08);
    padding: 1rem;
    border-radius: 0.5rem;
    overflow-x: auto;
  }
  .presentation-slide pre code {
    background: transparent;
    padding: 0;
  }
  .presentation-slide table {
    border-collapse: collapse;
    width: 100%;
  }
  .presentation-slide th,
  .presentation-slide td {
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 0.5rem 0.75rem;
  }
  .presentation-slide blockquote {
    border-left: 3px solid #a5b4fc;
    margin: 0;
    padding-left: 1rem;
    color: rgba(232, 232, 240, 0.8);
  }

  /* ── Bottom Navigation Bar ── */
  #presentation-bottombar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    padding: 0.75rem 1.2rem;
    background: rgba(255, 255, 255, 0.05);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    flex-shrink: 0;
  }
  #btn-prev-slide,
  #btn-next-slide {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: #e8e8f0;
    padding: 0.4rem 1.1rem;
    border-radius: 0.375rem;
    cursor: pointer;
    font-size: 0.9rem;
    transition: background 0.15s;
  }
  #btn-prev-slide:hover,
  #btn-next-slide:hover {
    background: rgba(255, 255, 255, 0.15);
  }
  #btn-prev-slide:disabled,
  #btn-next-slide:disabled {
    opacity: 0.35;
    cursor: default;
  }
  #slide-progress {
    font-size: 0.9rem;
    color: rgba(232, 232, 240, 0.65);
    min-width: 5rem;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
</style>

<script>
(function () {
  'use strict';

  // ── Constants ──
  const SLIDE_SEPARATOR_TAG = 'HR';
  const PRESENTATION_CONTENT_SELECTOR = '.content';
  const NO_SLIDE_CLASS = 'no-slide';
  const SLIDE_SPLIT_COMMENT = 'split';

  // ── State ──
  let slides = [];
  let currentIndex = 0;

  // ── Slide Building ──

  function isEmptyGroup(group) {
    if (group.length === 0) return true;
    return group.every(
      function (node) { return node.nodeType === Node.TEXT_NODE && node.nodeValue.trim() === ''; }
    );
  }

  function splitGroupByComment(group) {
    var subGroups = [];
    var current = [];
    for (var i = 0; i < group.length; i++) {
      var node = group[i];
      if (node.nodeType === Node.COMMENT_NODE && node.nodeValue.trim() === SLIDE_SPLIT_COMMENT) {
        subGroups.push(current);
        current = [];
      } else {
        current.push(node);
      }
    }
    subGroups.push(current);
    return subGroups.filter(function (g) { return !isEmptyGroup(g); });
  }

  function buildSlides() {
    var container = document.querySelector(PRESENTATION_CONTENT_SELECTOR);
    if (!container) return [];

    var nodes = Array.from(container.childNodes);
    var roughGroups = [];
    var currentGroup = [];

    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (node.nodeName === SLIDE_SEPARATOR_TAG) {
        roughGroups.push(currentGroup);
        currentGroup = [];
      } else if (node.classList && node.classList.contains(NO_SLIDE_CLASS)) {
        // skip no-slide elements
      } else {
        currentGroup.push(node);
      }
    }
    roughGroups.push(currentGroup);

    var slides = [];
    for (var j = 0; j < roughGroups.length; j++) {
      var subGroups = splitGroupByComment(roughGroups[j]);
      for (var k = 0; k < subGroups.length; k++) {
        slides.push(subGroups[k]);
      }
    }
    return slides;
  }

  // ── Overlay Construction ──

  function createOverlay() {
    const overlay = document.createElement('div');
    overlay.id = 'presentation-overlay';

    const topBar = document.createElement('div');
    topBar.id = 'presentation-topbar';

    const exitBtn = document.createElement('button');
    exitBtn.id = 'btn-exit-presentation';
    exitBtn.textContent = '✕ 退出';
    topBar.appendChild(exitBtn);
    overlay.appendChild(topBar);

    const slideArea = document.createElement('div');
    slideArea.id = 'presentation-slide-area';
    overlay.appendChild(slideArea);

    const bottomBar = document.createElement('div');
    bottomBar.id = 'presentation-bottombar';

    const prevBtn = document.createElement('button');
    prevBtn.id = 'btn-prev-slide';
    prevBtn.textContent = '← 上一張';

    const progress = document.createElement('span');
    progress.id = 'slide-progress';

    const nextBtn = document.createElement('button');
    nextBtn.id = 'btn-next-slide';
    nextBtn.textContent = '下一張 →';

    bottomBar.appendChild(prevBtn);
    bottomBar.appendChild(progress);
    bottomBar.appendChild(nextBtn);
    overlay.appendChild(bottomBar);

    return overlay;
  }

  // ── Slide Display ──

  function showSlide(index) {
    if (index < 0 || index >= slides.length) return;

    currentIndex = index;

    const slideArea = document.getElementById('presentation-slide-area');
    if (!slideArea) return;

    slideArea.innerHTML = '';
    const slideDiv = document.createElement('div');
    slideDiv.className = 'presentation-slide';
    for (const node of slides[index]) {
      slideDiv.appendChild(node.cloneNode(true));
    }
    slideArea.appendChild(slideDiv);

    const progress = document.getElementById('slide-progress');
    if (progress) {
      progress.textContent = (currentIndex + 1) + ' / ' + slides.length;
    }
  }

  // ── Navigation ──

  function nextSlide() {
    if (currentIndex < slides.length - 1) {
      showSlide(currentIndex + 1);
    }
  }

  function prevSlide() {
    if (currentIndex > 0) {
      showSlide(currentIndex - 1);
    }
  }

  // ── Keyboard Handler ──

  function handleKeydown(event) {
    switch (event.key) {
      case 'ArrowRight': nextSlide(); break;
      case 'ArrowLeft':  prevSlide(); break;
      case 'Escape':     exitPresentation(); break;
    }
  }

  // ── Fullscreen Change Handler ──

  function handleFullscreenChange() {
    if (!document.fullscreenElement) {
      exitPresentation();
    }
  }

  // ── Enter / Exit ──

  function enterPresentation() {
    slides = buildSlides();
    currentIndex = 0;

    const overlay = createOverlay();
    document.body.appendChild(overlay);

    document.getElementById('btn-exit-presentation').addEventListener('click', exitPresentation);
    document.getElementById('btn-next-slide').addEventListener('click', nextSlide);
    document.getElementById('btn-prev-slide').addEventListener('click', prevSlide);

    showSlide(0);

    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen().catch(function () {});
    }

    document.addEventListener('keydown', handleKeydown);
    document.addEventListener('fullscreenchange', handleFullscreenChange);
  }

  function exitPresentation() {
    const overlay = document.getElementById('presentation-overlay');
    if (overlay) overlay.remove();

    if (document.fullscreenElement && document.exitFullscreen) {
      document.exitFullscreen().catch(function () {});
    }

    document.removeEventListener('keydown', handleKeydown);
    document.removeEventListener('fullscreenchange', handleFullscreenChange);
  }

  // ── Bootstrap ──

  document.addEventListener('DOMContentLoaded', function () {
    const btn = document.getElementById('btn-enter-presentation');
    if (btn) {
      btn.addEventListener('click', enterPresentation);
    }
  });
}());
</script>
