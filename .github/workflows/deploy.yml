name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main

env:
  GITHUB_PAGES_URL: https://github-copilot-consumer.github.io/ai-sdd-course/

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.147.0'
          extended: true

      - name: Build site
        run: hugo -s site/ --minify -b ${{ env.GITHUB_PAGES_URL }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site/public
          enable_jekyll: false
